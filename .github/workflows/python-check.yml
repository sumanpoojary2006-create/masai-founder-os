name: Python Check

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r ai_company/requirements.txt

      - name: Compile Python files
        run: python -m py_compile $(find ai_company -name '*.py' -print)
